name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Formatting
        run: ruff format --check .
      - name: Type check
        run: mypy src/gaussian_hsmm
      - name: Check source-distribution manifest
        run: check-manifest
      - name: Tests and coverage
        run: pytest --cov=gaussian_hsmm

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate distribution metadata and README
        run: python -m twine check dist/*
      - name: Upload distributions as CI artifacts only
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

# This workflow deliberately has no PyPI permissions and no publish job.
