name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private data or credentials. Use a minimal synthetic reproduction.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gaussian-hsmm version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Python, operating system, NumPy, SciPy, scikit-learn, and hmmlearn versions
    validations:
      required: true
